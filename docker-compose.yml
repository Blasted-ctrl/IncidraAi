services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: incident_triage_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: FordsonHigh12
      POSTGRES_DB: incident_triage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery and caching
  redis:
    image: redis:7-alpine
    container_name: incident_triage_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: incident_triage_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:FordsonHigh12@postgres:5432/incident_triage
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=2
      - DB_HOST=postgres
      - DB_NAME=incident_triage
      - DB_USER=postgres
      - DB_PASSWORD=FordsonHigh12
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery worker for background jobs
  celery_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: incident_triage_celery_worker
    command: celery -A src.celery_app worker --loglevel=info --concurrency=4 --queues=default,clustering,dead_letter
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=2
      - DB_HOST=postgres
      - DB_NAME=incident_triage
      - DB_USER=postgres
      - DB_PASSWORD=FordsonHigh12
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery beat for scheduled tasks
  celery_beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: incident_triage_celery_beat
    command: celery -A src.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=2
      - DB_HOST=postgres
      - DB_NAME=incident_triage
      - DB_USER=postgres
      - DB_PASSWORD=FordsonHigh12
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Next.js frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: incident_triage_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local