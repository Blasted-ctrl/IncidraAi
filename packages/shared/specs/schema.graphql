"""
Incident Triage GraphQL Schema
AI-assisted incident triage system for analyzing logs and clusters
"""

scalar DateTime
scalar UUID
scalar JSON

enum LogSeverity {
  DEBUG
  INFO
  WARNING
  ERROR
  CRITICAL
}

enum IncidentStatus {
  OPEN
  INVESTIGATING
  RESOLVED
  CLOSED
}

enum IncidentSeverity {
  LOW
  MEDIUM
  HIGH
  CRITICAL
}

enum RiskLevel {
  LOW
  MEDIUM
  HIGH
}

enum TimelineEventType {
  STATUS_CHANGE
  ASSIGNMENT
  TRIAGE
  COMMENT
  RESOLUTION
}

"""Log entry with tracing information"""
type Log {
  id: UUID!
  message: String!
  severity: LogSeverity!
  timestamp: DateTime!
  """Service or component that generated the log"""
  source: String!
  """Trace ID for distributed tracing"""
  traceId: UUID
  """Span ID for distributed tracing"""
  spanId: UUID
  """Custom metadata associated with the log"""
  metadata: JSON
  """Cluster this log belongs to"""
  cluster: Cluster
  """Incidents this log is associated with"""
  incidents: [Incident!]!
  """Related logs in the same trace or cluster"""
  relatedLogs: [Log!]!
}

"""Log cluster grouping similar logs"""
type Cluster {
  id: UUID!
  name: String!
  description: String
  """Number of logs in this cluster"""
  logCount: Int!
  """Sample logs from this cluster"""
  sampleLogs(limit: Int = 10): [Log!]!
  """All logs in this cluster"""
  logs(
    limit: Int = 50
    offset: Int = 0
    severity: LogSeverity
  ): LogConnection!
  createdAt: DateTime!
  """Severity level of the cluster"""
  severity: IncidentSeverity!
  """Incidents associated with this cluster"""
  incidents: [Incident!]!
  """Triage results for logs in this cluster"""
  triageResults: [TriageResult!]!
}

"""Paginated log results"""
type LogConnection {
  items: [Log!]!
  total: Int!
  limit: Int!
  offset: Int!
}

"""Incident in the system"""
type Incident {
  id: UUID!
  title: String!
  description: String
  status: IncidentStatus!
  severity: IncidentSeverity!
  createdAt: DateTime!
  updatedAt: DateTime!
  """When the incident was resolved"""
  resolvedAt: DateTime
  """User the incident is assigned to"""
  assignedTo: String
  """Logs associated with this incident"""
  logs(
    limit: Int = 50
    offset: Int = 0
    severity: LogSeverity
  ): LogConnection!
  """Clusters related to this incident"""
  clusters: [Cluster!]!
  """Triage results for this incident"""
  triageResults: [TriageResult!]!
  """Timeline of events for this incident"""
  timeline: [TimelineEvent!]!
}

"""Paginated incident results"""
type IncidentConnection {
  items: [Incident!]!
  total: Int!
  limit: Int!
  offset: Int!
}

"""Event in the incident timeline"""
type TimelineEvent {
  id: UUID!
  timestamp: DateTime!
  eventType: TimelineEventType!
  """User who performed the action"""
  actor: String
  """Additional event details"""
  details: JSON
}

"""Root cause hypothesis generated by AI triage"""
type RootCauseHypothesis {
  id: UUID!
  """Detailed root cause hypothesis"""
  hypothesis: String!
  """Confidence score between 0 and 1"""
  confidence: Float!
  """Logs supporting this hypothesis"""
  supportingLogs: [Log!]!
  """Relevant runbooks from knowledge base"""
  relevantRunbooks: [Runbook!]!
  """Similar incidents with known resolutions"""
  similarIncidents: [SimilarIncident!]!
}

"""Runbook reference"""
type Runbook {
  id: UUID!
  title: String!
  url: String!
}

"""Reference to a similar past incident"""
type SimilarIncident {
  id: UUID!
  title: String!
  resolution: String!
}

"""Mitigation step suggested by triage"""
type MitigationStep {
  id: UUID!
  """The action to take"""
  step: String!
  """Order to execute this step"""
  order: Int!
  """Estimated time to complete in minutes"""
  estimatedTimeMinutes: Int
  """Risk level of this mitigation step"""
  riskLevel: RiskLevel!
  """Whether this step can be automated"""
  automationPossible: Boolean!
}

"""Triage result with AI analysis"""
type TriageResult {
  id: UUID!
  incident: Incident!
  createdAt: DateTime!
  completedAt: DateTime!
  """Root cause hypotheses ranked by confidence"""
  rootCauseHypotheses: [RootCauseHypothesis!]!
  """Suggested mitigation steps"""
  mitigationSteps: [MitigationStep!]!
  """Executive summary of triage results"""
  summary: String!
  """Overall confidence score for this triage"""
  confidenceScore: Float!
  """Version of the AI model that generated this"""
  modelVersion: String!
  """Feedback provided on this triage result"""
  feedback: TriageFeedback
}

"""Feedback on triage result"""
type TriageFeedback {
  """The hypothesis that was correct (if any)"""
  correctHypothesis: RootCauseHypothesis
  """Actual root cause if different from hypotheses"""
  actualRootCause: String
  """Mitigation steps that were helpful"""
  helpfulSteps: [MitigationStep!]!
  """Time taken to resolve in minutes"""
  resolutionTimeMinutes: Int
  """Additional comments about the triage"""
  comment: String
}

type Query {
  """Get a specific log by ID"""
  log(id: UUID!): Log

  """List logs with filtering and pagination"""
  logs(
    limit: Int = 50
    offset: Int = 0
    severity: LogSeverity
    source: String
    incidentId: UUID
    clusterId: UUID
    startTime: DateTime
    endTime: DateTime
  ): LogConnection!

  """Get a specific cluster by ID"""
  cluster(id: UUID!): Cluster

  """List clusters with pagination"""
  clusters(
    limit: Int = 50
    offset: Int = 0
    severity: IncidentSeverity
    minLogCount: Int
  ): [Cluster!]!

  """Get a specific incident by ID"""
  incident(id: UUID!): Incident

  """List incidents with filtering and sorting"""
  incidents(
    limit: Int = 50
    offset: Int = 0
    status: IncidentStatus
    severity: IncidentSeverity
    assignedTo: String
    sortBy: IncidentSortBy = CREATED_AT
  ): IncidentConnection!

  """Get a specific triage result by ID"""
  triageResult(id: UUID!): TriageResult

  """List triage results with pagination"""
  triageResults(
    limit: Int = 50
    offset: Int = 0
    incidentId: UUID
  ): [TriageResult!]!

  """Get triage results for an incident"""
  incidentTriageHistory(incidentId: UUID!): [TriageResult!]!

  """Search across logs and incidents"""
  search(
    query: String!
    types: [SearchType!] = [LOG, INCIDENT]
    limit: Int = 50
  ): [SearchResult!]!
}

enum IncidentSortBy {
  CREATED_AT
  UPDATED_AT
  SEVERITY
}

enum SearchType {
  LOG
  INCIDENT
  CLUSTER
}

union SearchResult = Log | Incident | Cluster

type Mutation {
  """Create a new log entry"""
  createLog(input: CreateLogInput!): Log!

  """Create a new incident"""
  createIncident(input: CreateIncidentInput!): Incident!

  """Update an existing incident"""
  updateIncident(id: UUID!, input: UpdateIncidentInput!): Incident!

  """Assign an incident to a user"""
  assignIncident(incidentId: UUID!, assignedTo: String!): Incident!

  """Change incident status"""
  updateIncidentStatus(
    incidentId: UUID!
    status: IncidentStatus!
  ): Incident!

  """Run AI triage on an incident"""
  triageIncident(input: TriageInput!): TriageResult!

  """Submit feedback on a triage result"""
  submitTriageFeedback(
    triageId: UUID!
    input: TriageFeedbackInput!
  ): TriageResult!

  """Resolve an incident"""
  resolveIncident(
    incidentId: UUID!
    input: ResolveIncidentInput!
  ): Incident!
}

input CreateLogInput {
  message: String!
  severity: LogSeverity!
  source: String!
  traceId: UUID
  spanId: UUID
  metadata: JSON
}

input CreateIncidentInput {
  title: String!
  description: String
  severity: IncidentSeverity!
  clusterIds: [UUID!] = []
}

input UpdateIncidentInput {
  title: String
  description: String
  severity: IncidentSeverity
}

input TriageInput {
  """ID of the incident to triage"""
  incidentId: UUID!
  """IDs of logs to analyze"""
  logIds: [UUID!]!
  """Additional context for triage"""
  context: JSON
}

input TriageFeedbackInput {
  """ID of the correct hypothesis"""
  correctHypothesisId: UUID
  """Actual root cause if different from hypotheses"""
  actualRootCause: String
  """IDs of helpful mitigation steps"""
  helpfulStepIds: [UUID!]!
  """Time taken to resolve in minutes"""
  resolutionTimeMinutes: Int
  """Additional comments"""
  comment: String
}

input ResolveIncidentInput {
  resolution: String!
  rootCauseId: UUID
}

type Subscription {
  """Subscribe to new log entries"""
  logCreated(source: String): Log!

  """Subscribe to incident status changes"""
  incidentUpdated(status: IncidentStatus): Incident!

  """Subscribe to new triage results"""
  triageResultGenerated(incidentId: UUID): TriageResult!
}
