name: Test, Build, and Push

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/incident-triage-api
  PYTHON_VERSION: "3.12"
  COVERAGE_THRESHOLD: "85"
  EVAL_THRESHOLD: "0.70"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dependencies
        working-directory: ./apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,rag]"

      - name: Run unit tests with coverage gate
        working-directory: ./apps/api
        run: |
          pytest --override-ini addopts= \
            test/test_integration.py \
            test/test_celery.py \
            test/test_runtime_quality.py \
            -v \
            --cov=src.main \
            --cov=src.routes_clustering \
            --cov=src.routes_rag \
            --cov=src.tasks \
            --cov=src.observability \
            --cov=src.config \
            --cov=src.rag \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }}

      - name: Run RAG evaluation gate
        working-directory: ./apps/api
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'PY'
          import sys
          from src.rag import IncidentRAG
          from test.test_rag_evaluation import RAGEvaluator

          rag = IncidentRAG()
          evaluator = RAGEvaluator(rag)
          metrics = evaluator.evaluate_all()
          accuracy = metrics.overall_accuracy
          threshold = float("${{ env.EVAL_THRESHOLD }}")

          print(f"Overall RAG Accuracy: {accuracy:.2%}")

          if accuracy < threshold:
              print(
                  f"ERROR: RAG accuracy {accuracy:.2%} is below "
                  f"the required {threshold:.0%} threshold."
              )
              sys.exit(1)
          PY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: apps/api/coverage.xml
          if-no-files-found: ignore

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: false
          tags: incident-triage-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker_push:
    name: Docker Push
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
