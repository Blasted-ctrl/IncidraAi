name: Test, Build & Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/incident-triage-api

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: incident_triage
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,rag]"
      
      - name: Run unit tests with coverage
        working-directory: ./apps/api
        run: |
          pytest test/ \
            -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing
      
      - name: Check coverage threshold (85%)
        working-directory: ./apps/api
        run: |
          coverage report --fail-under=85
      
      - name: Run evaluation tests
        working-directory: ./apps/api
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          from src.rag import IncidentRAG
          from test.test_rag_evaluation import RAGEvaluator, GOLDEN_INCIDENTS
          
          rag = IncidentRAG()
          evaluator = RAGEvaluator(rag)
          metrics = evaluator.evaluate_all()
          
          # Check accuracy thresholds
          overall_acc = metrics.overall_accuracy
          print(f'Overall RAG Accuracy: {overall_acc:.2%}')
          
          if overall_acc < 0.70:
              print(f'ERROR: RAG accuracy {overall_acc:.2%} below 70% threshold')
              exit(1)
          
          print('✓ RAG evaluation passed (accuracy >= 70%)')
          print(evaluator.report())
          "
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/api/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./apps/api
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  quality-gates:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check test status
        if: needs.test.result == 'failure'
        run: |
          echo "❌ Tests failed"
          exit 1
      
      - name: Check build status
        if: needs.build.result == 'failure'
        run: |
          echo "❌ Docker build failed"
          exit 1
      
      - name: ✅ All quality gates passed
        run: echo "✓ Coverage >= 85%, Accuracy >= 70%, Build succeeded"
